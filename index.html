<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketick SEO Master</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .result { margin-top: 20px; display: none; }
        .score { font-size: 24px; color: #4caf50; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Ketick SEO Master</h2>
        <p>Analisis prestasi laman web anda dalam satu klik.</p>
        <input type="url" id="urlInput" placeholder="https://domainanda.com">
        <button onclick="analyzeSEO()">Mula Audit</button>
        
        <div id="result" class="result">
            <div class="score" id="score">85/100</div>
            <p id="details">Laman web anda mempunyai prestasi yang baik, namun perlukan optimasi pada tag metadata.</p>
        </div>
    </div>

    <script>
        function analyzeSEO() {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert('Masukkan URL!');
            
            // Simulasi Logik Audit
            document.getElementById('result').style.display = 'block';
            document.getElementById('score').innerText = Math.floor(Math.random() * (100 - 70 + 1) + 70) + "/100";
        }
    </script>
</body>
</html>
